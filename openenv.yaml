spec_version: 1
name: medical-triage-env
type: space
runtime: fastapi
app: server.app:app
port: 7860
version: "0.1.0"
description: >
  An OpenEnv environment simulating a clinical ER Triage Nurse scenario.
  The agent must assess patients, order diagnostics, assign triage levels, administer
  treatments, and handle life-threatening drug interactions — all under time pressure.
  Simulates a real hospital emergency department workflow.
author: "Losers"
tags:
  - openenv
  - medical
  - healthcare
  - reinforcement-learning
  - triage

endpoints:
  - POST /reset
  - POST /step
  - GET /state
  - GET /health

observation:
  type: object
  description: "Current ER state visible to the agent"
  fields:
    episode_id: "string — unique ID for this episode"
    queue_summary: "list — patients waiting (id, vitals, top symptoms)"
    active_beds_summary: "map — bed name → patient info or 'Empty'"
    alerts: "list[string] — last 5 system alerts and vitals warnings"
    current_step: "int — step counter since last reset"
    max_steps: "int — maximum steps allowed this episode"
    action_feedback: "string — natural language result of the last action"

action:
  type: object
  description: "Action submitted by the agent"
  fields:
    action_type: "string — one of: assess, order_test, treat, triage, admit, discharge, wait"
    patient_id: "string|null — target patient ID (required except for wait)"
    target: "string|null — test name / drug name / ward name / triage level"

graders:
  grade_task:
    module: grader
    function: grade_task

tasks:
  - id: easy
    name: "STEMI Triage"
    description: "Single STEMI patient — identify and admit to Cardiology"
    difficulty: easy
    max_steps: 15
    success_criteria: "Triage level 1, order ECG, administer Aspirin, admit to Cardiology"
    expected_score_range: [0.01, 0.99]
    grader: grade_task

  - id: medium
    name: "Sepsis + Opioid Overdose"
    description: "Sepsis patient with Penicillin allergy + Opioid Overdose — avoid fatal interactions"
    difficulty: medium
    max_steps: 20
    success_criteria: "Avoid Penicillin for P-102, use Naloxone for P-108, correct ward admissions"
    expected_score_range: [0.01, 0.99]
    grader: grade_task

  - id: hard
    name: "Mass Casualty"
    description: "Three simultaneous critical patients: Hemorrhagic Shock, Stroke, Status Asthmaticus"
    difficulty: hard
    max_steps: 25
    success_criteria: "Prioritize P-104 (Level 1), avoid blood thinners, correct wards for all three"
    expected_score_range: [0.01, 0.99]
    grader: grade_task

  - id: chaotic
    name: "ER Surge"
    description: "Multi-patient surge — test agentic triage and resource prioritization"
    difficulty: hard
    max_steps: 40
    success_criteria: "Successfully triage and treat 5+ patients under extreme pressure"
    expected_score_range: [0.01, 0.99]
    grader: grade_task

reward_range: [0.01, 0.99]
reward_description: >
  Step rewards provide partial progress signals throughout the episode.
  The terminal reward is a deterministic grade (0.01–0.99) based on correct
  triage levels, diagnostic tests ordered, treatments given, and ward dispositions.
  Fatal drug interactions incur a -0.40 penalty per event (clamped to 0.01).